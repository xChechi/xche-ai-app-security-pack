name: security

on:
  push:
  pull_request:
  # Scheduled + manual runs do a FULL-HISTORY gitleaks scan. push/pull_request events only
  # scan the event's commit range, so secrets already in the history (e.g. when this pack is
  # dropped into an existing repo) would never be caught without this.
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:

# No workflow-level permissions block: each job declares only the scopes it needs.

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action's pull_request path reads the PR's commit list via the GitHub API.
      # Read-only — comments stay off (GITLEAKS_ENABLE_COMMENTS), so write is not required.
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0            # full history (push/PR range scan + the scheduled full scan)
          persist-credentials: false
      # v3 runs on Node 24; v2 stops working on GitHub-hosted runners after 2026-09-16.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # Required: gitleaks-action exits on pull_request scans without a token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the engine to match the local pre-commit hook (the action otherwise defaults to 8.24.3).
          GITLEAKS_VERSION: "8.30.1"
          # Free for personal/public repos. GitHub Organization-OWNED repos need a free
          # GITLEAKS_LICENSE secret (from gitleaks.io) or this step fails with a license error.
          # NOTE: GitHub does not pass non-GITHUB_TOKEN secrets to fork-triggered runs, so on an
          # ORG repo this step fails closed on external fork PRs. If that affects you, gate this
          # step with `if: github.event.pull_request.head.repo.full_name == github.repository`
          # and run the open-source gitleaks CLI (no license needed) for fork PRs.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # The action posts PR comments on findings by default, which needs pull-requests: write.
          # We keep least privilege and let the job *block* via exit code instead of annotating.
          GITLEAKS_ENABLE_COMMENTS: "false"

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # --- Node --- (blocks on high/critical advisories). Covers the npm lockfile. If your
      # project uses pnpm or yarn, add the equivalent gated step (`pnpm audit --audit-level high`,
      # or `yarn npm audit` on berry / `yarn audit` on classic) — omitted here because the audit
      # syntax differs across package managers and a wrong invocation would false-fail the gate.
      - name: npm audit
        if: hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != ''
        run: npm audit --audit-level=high

      # --- Python ---
      - name: pip-audit
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip pip-audit
          # Bare `pip-audit` audits the runner's environment, NOT the project — target the
          # project's declared deps explicitly. Advisory (non-blocking) so it doesn't fail
          # onboarding on a pre-existing baseline; drop "|| true" to make it a hard gate.
          # NOTE: pip-audit resolves dependencies (which can execute build code) and on fork
          # PRs that runs against untrusted dep files. The token here is read-only with no
          # secrets, so blast radius is limited; add `--no-deps` if you want to skip resolution
          # (at the cost of not auditing transitive dependencies).
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip-audit . || true; fi

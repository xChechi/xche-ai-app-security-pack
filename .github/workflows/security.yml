name: security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pin to the latest released version — check https://github.com/gitleaks/gitleaks-action
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Node projects ---
      - name: npm audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high

      # --- Python projects ---
      - name: pip-audit
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit || true   # set to fail the build once your baseline is clean

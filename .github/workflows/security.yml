name: security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # v3 runs on Node 24; v2 stops working on GitHub-hosted runners after 2026-09-16.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # Required: gitleaks-action exits on pull_request scans without a token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the engine to match the local pre-commit hook (the action otherwise defaults to 8.24.3).
          GITLEAKS_VERSION: "8.30.1"
          # Free for personal/public repos. GitHub Organization-OWNED repos need a free
          # GITLEAKS_LICENSE secret (from gitleaks.io) or this step fails with a license error.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # The action posts PR comments on findings by default, which needs
          # pull-requests: write. We keep least privilege (contents: read) and let the
          # job *block* via exit code instead of annotating, so comments stay off.
          GITLEAKS_ENABLE_COMMENTS: "false"

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- Node projects --- (blocks on high/critical advisories)
      - name: npm audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high

      # --- Python projects ---
      - name: pip-audit
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip pip-audit
          # Advisory (non-blocking) so it doesn't fail onboarding on a pre-existing
          # baseline. Remove "|| true" to make Python deps a hard gate like npm audit.
          pip-audit || true
